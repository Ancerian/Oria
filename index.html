<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIA — Прототипы проекта</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 40px;
            text-align: center;
            font-size: 1.1rem;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            /* Увеличено, чтобы три карточки свободно помещались в ряд */
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background-color: var(--card);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 32px;
            flex: 1;
            min-width: 250px;
            /* Уменьшено, чтобы избежать принудительного переноса V3 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
            box-sizing: border-box;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #fff;
            text-align: center;
            /* Центрирование заголовков для баланса */
        }

        .card p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .btn {
            display: block;
            text-align: center;
            background-color: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>

<body>

    <h1>Прототипы проекта ORIA</h1>
    <div class="subtitle">Выберите версию для демонстрации команде</div>

    <div class="container">
        <div class="card">
            <div>
                <h2>Концепт-Макет (V1)</h2>
            </div>
            <a href="./oria-site-mockup/index.html" class="btn">Открыть V1 Макет</a>
        </div>

        <div class="card">
            <div>
                <h2>Макет (V2)</h2>
            </div>
            <!-- Внимание: если папка называется с пробелом, лучше переименовать её в untitled-folder и в коде, и в проводнике -->
            <a href="./untitled folder/index.html" class="btn">Макет V2</a>
        </div>

        <div class="card">
            <div>
                <h2>Макет (V3)</h2>
            </div>
            <a href="./123/index.html" class="btn">Макет V3</a>
        </div>
    </div>

</body>

</html>
